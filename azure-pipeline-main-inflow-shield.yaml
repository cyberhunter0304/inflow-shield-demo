name: $(BuildID)
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - inflow-shield/*
    
pr:
 branches:
    exclude:
      - "*"
      
resources:
- repo: self

variables:
  dockerRegistryServiceConnection: 'iNextLabs-Staging-ACR'
  imageRepository: 'demo/inflow-shield'
  containerRegistry: 'inflowstgacr.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/inflow-shield/Dockerfile'
  buildContext: $(Build.SourcesDirectory)/inflow-shield
  tag: '$(Build.BuildNumber)'  # Or use '$(Build.SourceVersion)' for Git commit hash

stages:
- stage: Build
  displayName: Build and Push Image to ACR
  jobs:
  - job: BuildAndPush
    displayName: Build Docker Image
    pool:
      name: iNextLabsAgentPool-Linux
    steps:
    - task: Docker@2
      displayName: Build and Push Docker Image
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
          latest